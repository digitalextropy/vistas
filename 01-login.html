<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vistas Revenue Estimator</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--white);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .login-brand {
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .login-tagline {
      font-size: 13px;
      color: var(--gray-500);
      margin-bottom: 32px;
    }
    .login-card .form-group { text-align: left; }
    .login-card .form-input { padding: 12px 14px; }
    .login-btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="margin-bottom: 12px;">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
        <circle cx="30" cy="30" r="28" fill="#eef4ec" stroke="#A8C4A0" stroke-width="2"/>
        <path d="M20 38 L30 20 L40 38 Z" fill="#1B2E4B" opacity="0.8"/>
        <path d="M24 38 L30 26 L36 38 Z" fill="#A8C4A0"/>
      </svg>
    </div>
    <div class="login-brand">Vistas Revenue Estimator</div>
    <div class="login-tagline">Sign in to your account</div>
    <form>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary login-btn">Sign In</button>
    </form>
  </div>
</body>
</html>
